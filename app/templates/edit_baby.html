<!DOCTYPE html>
<html>
<head>
    <title>Edit Baby Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="mb-4">✏️ Edit Baby Profile</h2>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label>Baby Name</label>
<input type="text" class="form-control" name="baby_name"
value="{{ baby.baby_name }}" required>
</div>

<div class="mb-3">
<label>Date of Birth</label>
<input type="date" class="form-control" name="dob"
value="{{ baby.dob }}" required>
</div>

<div class="mb-3">
<label>Gender</label>

<select class="form-select" name="gender">

<option {% if baby.gender=="Male" %}selected{% endif %}>Male</option>

<option {% if baby.gender=="Female" %}selected{% endif %}>Female</option>

<option {% if baby.gender=="Other" %}selected{% endif %}>Other</option>

</select>

</div>

<div class="mb-3">
<label>Blood Group</label>
<input type="text" class="form-control"
name="blood_group"
value="{{ baby.blood_group }}">
</div>

<div class="mb-3">
<label>Height</label>
<input type="number" step="0.1"
class="form-control"
name="height"
value="{{ baby.height }}">
</div>

<div class="mb-3">
<label>Weight</label>
<input type="number" step="0.1"
class="form-control"
name="weight"
value="{{ baby.weight }}">
</div>

<div class="mb-3">
<label>Parent Name</label>
<input type="text"
class="form-control"
name="parent_name"
value="{{ baby.parent_name }}">
</div>

<div class="mb-3">
<label>Parent Phone</label>
<input type="text"
class="form-control"
name="parent_phone"
value="{{ baby.parent_phone }}">
</div>

<div class="mb-4 text-center">

    <label class="form-label fw-bold">
        Current Profile Picture
    </label>
    <br>

    {% if baby.photo %}
        <img src="{{ url_for('static', filename='uploads/' + baby.photo) }}"
             class="rounded-circle shadow mb-3"
             style="width:180px;height:180px;object-fit:cover;">
    {% else %}
        <img src="{{ url_for('static', filename='baby.png') }}"
             class="rounded-circle shadow mb-3"
             style="width:180px;height:180px;object-fit:cover;">
    {% endif %}

    <div class="mt-3">
        <label class="form-label fw-bold">
            Change Profile Picture
        </label>

        <input type="file"
               name="photo"
               class="form-control"
               accept="image/*">
    </div>

</div>
<button class="btn btn-warning w-100">
Update Profile
</button>

</form>

</div>

</div>

</body>
</html>
